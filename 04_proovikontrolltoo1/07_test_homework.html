<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery charge</title>
    <script src="07_test_homework.js"></script>
    <script>
        let myBattery;

        function startPage() {
            let canvas = document.getElementById("canvas");
            let ctx = canvas.getContext("2d");

            myBattery = new Battery(5000, 1000, ctx, 50, 40)
        }

        function onCharge() {
            let secondsInput = document.getElementById("secondsInput");
            let seconds = parseInt(secondsInput.value);

            if (seconds > 0) {
                myBattery.charge(seconds);
            }
        }

        function onDrain() {
            myBattery.drain(500);
        }
    </script>
</head>

<body onload="startPage()">
    <h2>Visual battery simulator</h2>
    <canvas id="canvas" width="500" height="200" style="border: 1px solid black; background-color: whitesmoke;"></canvas>

    <br><br>

    <label>Seconds to charge (50W):</label>
    <input type="number" id="secondsInput" min="1" value="60" style="width: 80px;" />
    <button onclick="onCharge()">Charge</button>

    <br><br>

    <button onclick="onDrain()" style="background-color: #ffcccc; border: 1px solid red padding 5px;">Drain 500
        mAh</button>



</body>

</html>
