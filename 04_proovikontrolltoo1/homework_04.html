<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultural Trip Planner</title>
    <script src="homework_04.js"></script>
    <script>
        function startPage() {
            let canvas = document.getElementById("mapCanvas");
            let ctx = canvas.getContext("2d");
            //initial points
            let trip = new TripRoute([50, 200], [50, 80]);
            trip.addStop(150, 250);
            trip.addStop(80, 200);

            trip.draw(ctx);
            document.getElementById("distanceOut").innerText = trip.calculateTotalDistance() + " units";

            //budget stats
            let yearCosts = [15, 20, 10, 80, 100, 12];
            let totalAvg = averageCost(yearCosts);
            document.getElementById("avgOut").innerText = totalAvg + " EUR";
            let slidingAvg = slidingAverageCosts(yearCosts, 3);
            document.getElementById("slidingOut").innerText = slidingAvg.join(" EUR, ") + " EUR";
        }
    </script>
</head>

<body onload="startPage()">
    <h2>Kultuuriasutusse väljasõit ja eelarve</h2>
    <canvas id="mapCanvas" width="300" height="300"
        style="border: 1px solid black; background-color: whitesmoke;"></canvas>
    <h3>Route statistics</h3>
    <p>Total walking distance: <b id="distanceOut"></b></p>

    <hr>

    <h3>Budget statistics</h3>
    <p>All yearly costs: [15, 20, 10, 80, 100, 12] EUR</p>
    <p>Overall average cost: <b id="avgOut"></b></p>
    <p>Sliding average (Trends over 3 events left->right): <b id="slidingOut"></b></p>
</body>

</html>
