<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script>
        let calcobj = null;
        let exports = {};
        function startPage() {
            calcobj = new Calculator();
            document.getElementById("panel1").innerText = calcobj.getPanelContent();
        }

        function buttonPress(ev) {
            calcobj.pressButton(ev.target.value);
            document.getElementById("panel1").innerText = calcobj.getPanelContent();
        }
        //This is to expose the functions to the html
        window.startPage = startPage;
        window.buttonPress = buttonPress;
    </script>
    <script src="03_calculator.js" defer></script>
    <style>
        .calc {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0px 15px rgba(0, 0, 0, 0.1);
        }

        #panel1 {
            background: #eee;
            padding: 15px;
            margin-bottom: 10px;
            text-align: right;
            font-size: 20px;
            border: 1px solid black;
        }

        input[type=button] {
            width: 45px;
            height: 45px;
            margin: 2px;
            cursor: pointer;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        #clearButton {
            background: orange;
            width: 45px;
        }

        .eq {
            background: lightgreen;
            width: 96px;
        }
    </style>
</head>

<body onload="startPage()">
    <div class="calc">
        <h1 style="font-family: Arial, Helvetica, sans-serif;">Calculator</h1>
        <div id="panel1"></div>
        <div>
            <input type="button" onclick="buttonPress(event)" value="7" />
            <input type="button" onclick="buttonPress(event)" value="8" />
            <input type="button" onclick="buttonPress(event)" value="9" />
            <input type="button" onclick="buttonPress(event)" value="/" />
        </div>
        <div>
            <input type="button" onclick="buttonPress(event)" value="4" />
            <input type="button" onclick="buttonPress(event)" value="5" />
            <input type="button" onclick="buttonPress(event)" value="6" />
            <input type="button" onclick="buttonPress(event)" value="*" />
        </div>
        <div>
            <input type="button" onclick="buttonPress(event)" value="1" />
            <input type="button" onclick="buttonPress(event)" value="2" />
            <input type="button" onclick="buttonPress(event)" value="3" />
            <input type="button" onclick="buttonPress(event)" value="-" />
        </div>
        <div>
            <input type="button" onclick="buttonPress(event)" value="0" />
            <input type="button" id="clearButton" onclick="buttonPress(event)" value="C" />
            <input type="button" onclick="buttonPress(event)" value="+" />
        </div>
        <div style="margin-top: 5px">
            <input type="button" style="width: 105px; background-color: lightgreen;" onclick="buttonPress(event)"
                value="=" />
        </div>
    </div>
</body>

</html>
